<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f1fa" />
    <meta name="description" content="A focused daily practice space for advanced English production." />
    <link rel="icon" type="image/svg+xml" sizes="any" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet" />
    <title>C1 English Daily Activation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var isDevHost = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(window.location.hostname)
        var viteEntry = document.querySelector('script[type="module"][src$="/src/main.tsx"]')

        if (!viteEntry || isDevHost) return

        var stylesheet = document.createElement('link')
        stylesheet.rel = 'stylesheet'
        stylesheet.href = './dist/assets/index.css'
        document.head.appendChild(stylesheet)

        var script = document.createElement('script')
        script.type = 'module'
        script.src = './dist/assets/index.js'
        document.body.appendChild(script)
      })()
    </script>
  </body>
</html>
